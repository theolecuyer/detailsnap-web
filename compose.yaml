services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: detailsnap
      MYSQL_USER: detailsnap
      MYSQL_PASSWORD: changeme
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-udetailsnap", "-pchangeme"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "3306:3306"

  auth-service:
    build: ./auth-service
    env_file: ./auth-service/.env
    environment:
      DB_HOST: mysql
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  core-service:
    build: ./core-service
    env_file: ./core-service/.env
    environment:
      DB_HOST: mysql
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy

  media-service:
    build: ./media-service
    env_file: ./media-service/.env
    environment:
      DB_HOST: mysql
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy

  # Builds static files and seeds the frontend-static volume.
  # Docker auto-populates an empty named volume from the image on first start.
  # After a frontend rebuild, run: docker compose down -v && docker compose up --build
  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_URL: http://localhost:8081
        VITE_CORE_URL: http://localhost:8082
        VITE_MEDIA_URL: http://localhost:8083
    volumes:
      - frontend-static:/dist

  nginx:
    image: nginx:alpine
    ports:
      - "5173:80"
    volumes:
      - frontend-static:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend

volumes:
  mysql-data:
  frontend-static:

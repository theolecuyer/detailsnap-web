name: Conventional Commits Check

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]

jobs:
    check:
        name: Validate commit messages
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest

        steps:
            - name: Check conventional commits
              id: cc
              uses: webiny/action-conventional-commits@4ae80bc67b0b2e72a4d091a7b18eb4ecc7db68c8 # v1.3.0
              with:
                  allowed-commit-types: "feat,fix,docs,style,refactor,perf,test,chore,ci,build,revert"

            - name: Notify rejection via Resend
              if: failure()
              run: |
                  curl -sX POST https://api.resend.com/emails \
                    -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"from\": \"ci@system.tlecuyer.codes\",
                      \"to\": [\"theoglecuyer@gmail.com\"],
                      \"subject\": \"PR #${{ github.event.pull_request.number }} blocked — non-conventional commits\",
                      \"html\": \"<h3>PR <a href='${{ github.event.pull_request.html_url }}'>#${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}</a> by ${{ github.event.pull_request.user.login }} was blocked.</h3><p>One or more commits do not follow <a href='https://www.conventionalcommits.org'>Conventional Commits</a> format.</p><p>Valid format: <code>type(scope): description</code><br>Valid types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert</p>\"
                    }"

    dispatch-qa-build:
        name: Trigger QA build on merge
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest

        steps:
            - name: Dispatch QA build to infra repo
              uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
              with:
                  github-token: ${{ secrets.GH_TOKEN }}
                  script: |
                      await github.rest.repos.createDispatchEvent({
                        owner: 'theolecuyer',
                        repo: 'detailsnap-web-infra',
                        event_type: 'qa-build',
                      });
                      console.log('Dispatched QA build for merged PR #${{ github.event.pull_request.number }}');

    auto-rc-tag:
        name: Auto-create RC tag on merge
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout with tags
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GH_TOKEN }}

            - name: Determine and push next RC tag
              run: |
                  # Find latest release tag (no -rc suffix)
                  LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
                    | grep -v '\-rc\.' | sort -V | tail -1)
                  [ -z "$LATEST" ] && LATEST="v0.0.0"

                  MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
                  MINOR=$(echo "$LATEST" | cut -d. -f2)
                  PATCH=$(echo "$LATEST" | cut -d. -f3)

                  # Check PR commits for feat: → minor bump, else patch bump
                  COMMITS=$(git log --pretty=format:"%s" HEAD~${{ github.event.pull_request.commits }}..HEAD)
                  if echo "$COMMITS" | grep -q '^feat'; then
                    MINOR=$((MINOR + 1))
                    PATCH=0
                  else
                    PATCH=$((PATCH + 1))
                  fi

                  NEXT="v$MAJOR.$MINOR.$PATCH"

                  # Increment RC number if this version already has RCs
                  RC_COUNT=$(git tag -l "${NEXT}-rc.*" | wc -l | tr -d ' ')
                  NEW_TAG="${NEXT}-rc.$((RC_COUNT + 1))"

                  echo "Creating tag: $NEW_TAG"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "$NEW_TAG"
                  git push origin "$NEW_TAG"

name: Conventional Commits Check

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]

jobs:
    check:
        name: Validate commit messages
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest

        steps:
            - name: Check conventional commits
              id: cc
              uses: webiny/action-conventional-commits@4ae80bc67b0b2e72a4d091a7b18eb4ecc7db68c8 # v1.3.0
              with:
                  allowed-commit-types: "feat,fix,docs,style,refactor,perf,test,chore,ci,build,revert"

            - name: Notify rejection via Resend
              if: failure()
              run: |
                  curl -sX POST https://api.resend.com/emails \
                    -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"from\": \"ci@system.tlecuyer.codes\",
                      \"to\": [\"theoglecuyer@gmail.com\"],
                      \"subject\": \"PR #${{ github.event.pull_request.number }} blocked — non-conventional commits\",
                      \"html\": \"<h3>PR <a href='${{ github.event.pull_request.html_url }}'>#${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}</a> by ${{ github.event.pull_request.user.login }} was blocked.</h3><p>One or more commits do not follow <a href='https://www.conventionalcommits.org'>Conventional Commits</a> format.</p><p>Valid format: <code>type(scope): description</code><br>Valid types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert</p>\"
                    }"



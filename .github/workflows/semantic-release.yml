name: Semantic Release

on:
    push:
        branches:
            - main

jobs:
    release:
        name: Create RC tag
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GH_TOKEN }}
                  persist-credentials: false

            - name: Semantic Release
              uses: cycjimmy/semantic-release-action@v4
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

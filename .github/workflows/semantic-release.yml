name: Semantic Release

# Runs on every push to main (i.e. every PR merge).
# Responsibilities:
#   1. Determine next RC version via semantic-release (conventional commits → semver bump)
#   2. Create the RC git tag in this repo (source of truth for version history)
#   3. Dispatch qa-build to infra, passing the immutable SHA and RC tag
#      so the infra side can build once and promote without ever touching `latest`
on:
    push:
        branches:
            - main

jobs:
    release:
        name: Version and dispatch
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GH_TOKEN }}
                  # Required so semantic-release can push the RC git tag
                  persist-credentials: false

            - name: Get short SHA
              id: sha
              run: echo "short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

            - name: Semantic Release
              id: semantic
              uses: cycjimmy/semantic-release-action@v4
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

            # Always dispatch qa-build so every merge gets tested in QA.
            # rc_tag is only non-empty when semantic-release published a new RC
            # (fix/feat commit) — infra uses it as the promotion target after tests.
            - name: Dispatch QA build to infra
              uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
              with:
                  github-token: ${{ secrets.GH_TOKEN }}
                  script: |
                      const published = '${{ steps.semantic.outputs.new_release_published }}' === 'true';
                      const rcTag    = published ? '${{ steps.semantic.outputs.new_release_git_tag }}' : '';
                      const sha      = '${{ steps.sha.outputs.short }}';

                      await github.rest.repos.createDispatchEvent({
                        owner: 'theolecuyer',
                        repo:  'detailsnap-web-infra',
                        event_type: 'qa-build',
                        client_payload: {
                          sha:    sha,      // e.g. "abc1234"  — used to tag and promote the image
                          rc_tag: rcTag,    // e.g. "v1.0.2-rc.1" — empty for chore/docs commits
                        },
                      });

                      console.log(`Dispatched qa-build sha=${sha} rc_tag=${rcTag || '(none)'}`);

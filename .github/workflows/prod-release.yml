name: Production Release — Deploy to Prod

# Triggered when a final release tag is pushed (e.g. v1.0.1)
on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
    dispatch:
        name: Dispatch prod deploy
        runs-on: ubuntu-latest
        steps:
            - name: Trigger infra prod workflow
              uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
              with:
                  github-token: ${{ secrets.GH_TOKEN }}
                  script: |
                      await github.rest.repos.createDispatchEvent({
                        owner: 'theolecuyer',
                        repo: 'detailsnap-web-infra',
                        event_type: 'prod-deploy',
                        client_payload: { tag: '${{ github.ref_name }}' }
                      });
                      console.log('Dispatched prod deploy for tag: ${{ github.ref_name }}');

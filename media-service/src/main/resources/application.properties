server.port=${PORT:8083}

# DataSource
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:detailsnap}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8mb4&connectTimeout=5000&socketTimeout=30000
spring.datasource.username=${DB_USER:detailsnap}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=5000

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB

# App
app.jwt.secret=${JWT_SECRET:change-me-in-production}
app.s3.bucket=${S3_BUCKET:detailsnap-photos-dev}
app.s3.presigned-url-ttl-seconds=${PRESIGNED_URL_TTL_SECONDS:3600}
app.cors.origin=${CORS_ORIGIN:http://localhost:5173}

# AWS SDK picks up AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY from environment automatically
